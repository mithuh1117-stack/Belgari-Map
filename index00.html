<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belgari Property Portal (Interactive Demo)</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            height: 100vh;
        }
        #map { 
            width: 70%; 
            height: 100%; 
        }
        #sidebar { 
            width: 30%; 
            height: 100%; 
            background: #ffffff; 
            padding: 25px; 
            box-sizing: border-box; 
            overflow-y: auto; 
            border-left: 3px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        h2 { 
            color: #2c3e50; 
            margin-top: 0;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            font-size: 22px;
        }
        .instruction-text {
            color: #7f8c8d;
            font-style: italic;
        }
        .info-card { 
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .info-card p {
            margin: 8px 0;
            color: #34495e;
            font-size: 15px;
        }
        .info-card strong {
            color: #2c3e50;
        }
        .year-selector-container {
            margin-top: 15px;
            background: #ebf5fb;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #3498db;
        }
        label {
            font-weight: bold;
            color: #2c3e50;
            display: block;
            margin-bottom: 8px;
        }
        select {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #bdc3c7;
            font-size: 14px;
            background-color: white;
            cursor: pointer;
        }
        .property-img { 
            width: 100%; 
            height: 220px; 
            object-fit: cover; 
            border-radius: 8px; 
            margin-top: 15px; 
            border: 2px solid #bdc3c7;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        .property-img:hover {
            transform: scale(1.02);
        }
        /* Leaflet popup styling */
        .leaflet-popup-content-wrapper {
            background: #2c3e50;
            color: #fff;
            border-radius: 4px;
        }
        .leaflet-popup-tip {
            background: #2c3e50;
        }
    </style>
</head>
<body>

    <!-- ম্যাপ এরিয়া -->
    <div id="map"></div>
    
    <!-- সাইডবার এরিয়া -->
    <div id="sidebar">
        <h2>Belgari Land Portal</h2>
        
        <div id="welcome-message">
            <p class="instruction-text">প্লটের তথ্য ও ঐতিহাসিক ছবি দেখতে ম্যাপের যেকোনো পার্সেলের উপর ক্লিক করুন।</p>
        </div>

        <div id="details" class="info-card" style="display:none;">
            <p><strong>স্থাপনা/জায়গা:</strong> <span id="prop-name">-</span></p>
            <p><strong>মালিকের নাম:</strong> <span id="owner-name">-</span></p>
            <p><strong>আয়তন (Area):</strong> <span id="prop-size">-</span> m²</p>
            <p><strong>ব্যবহার (Use):</strong> <span id="prop-use">-</span></p>
            
            <!-- ২ বছর পর পর ছবি বদলানোর ফিচার (Time Machine) -->
            <div class="year-selector-container">
                <label for="yearSelect">🕒 ছবি দেখার বছর নির্বাচন করুন:</label>
                <select id="yearSelect" onchange="updateImageByYear()">
                    <option value="2026">2026 (সর্বশেষ আপডেট)</option>
                    <option value="2024">2024 (২ বছর আগে)</option>
                    <option value="2022">2022 (৪ বছর আগে)</option>
                </select>
            </div>
            
            <img id="prop-image" class="property-img" src="" alt="Property View">
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // ১. ম্যাপ তৈরি করা এবং বেলগারি গ্রামের সেন্টারে ভিউ সেট করা
        var map = L.map('map').setView([24.5495, 89.4655], 16); 

        // ২. হাই-রেজোলিউশন গুগল স্যাটেলাইট ম্যাপ যোগ করা
        var googleSatellite = L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
            maxZoom: 21,
            subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
            attribution: '© Google Maps & BGIS Bangladesh'
        }).addTo(map);

        // ৩. আপনার দেওয়া রিয়েল ১০টি প্লটের GeoJSON ডাটা
        var parcelData = {
          "type": "FeatureCollection",
          "features": [
            { "type": "Feature", "properties": { "id": "01", "Name": "Aam Bagan", "Owner": "Mr. A", "area": 8755.563, "Use": "Commertial" }, "geometry": { "type": "MultiPolygon", "coordinates": [ [ [ [ 89.466532942099732, 24.546148175764007 ], [ 89.466397575646511, 24.546670096951921 ], [ 89.466663313548921, 24.546698454299818 ], [ 89.466573380072006, 24.547082265952792 ], [ 89.466930109094747, 24.547222922462765 ], [ 89.467533388450931, 24.546204388546084 ], [ 89.467087441531902, 24.546042478031229 ], [ 89.466532942099732, 24.546148175764007 ] ] ] ] } },
            { "type": "Feature", "properties": { "id": "02", "Name": "Agro Farm", "Owner": "Pir Saheb", "area": 21684.138, "Use": "Commertial" }, "geometry": { "type": "MultiPolygon", "coordinates": [ [ [ [ 89.465702151398133, 24.549987809259125 ], [ 89.466165525270156, 24.550145117026627 ], [ 89.466759742007639, 24.550344432778061 ], [ 89.466949771982854, 24.550479489187065 ], [ 89.467308380459258, 24.550716259937655 ], [ 89.467684851645146, 24.550208587166573 ], [ 89.467853438886948, 24.550128619846607 ], [ 89.46796136137263, 24.549724358261653 ], [ 89.46614351953022, 24.549088080508426 ], [ 89.466075223523404, 24.549293467599846 ], [ 89.465702151398133, 24.549987809259125 ] ] ] ] } },
            { "type": "Feature", "properties": { "id": "03", "Name": "Jamaler Bari", "Owner": "Jamal", "area": 1449.453, "Use": "Resident" }, "geometry": { "type": "MultiPolygon", "coordinates": [ [ [ [ 89.465478287236749, 24.550040323068764 ], [ 89.465384299536936, 24.550311692615306 ], [ 89.465750013257903, 24.550426309849481 ], [ 89.4658719894462, 24.55010389436913 ], [ 89.465662887569621, 24.550035555883905 ], [ 89.465478287236749, 24.550040323068764 ] ] ] ] } },
            { "type": "Feature", "properties": { "id": "04", "Name": "Apon er Bari", "Owner": "Apon", "area": 995.161, "Use": "Resident" }, "geometry": { "type": "MultiPolygon", "coordinates": [ [ [ [ 89.464789256705799, 24.550577136873894 ], [ 89.465139877978629, 24.550685203542411 ], [ 89.465241761336117, 24.550445378945909 ], [ 89.465049897798792, 24.550401210535178 ], [ 89.464850100966572, 24.550394141387549 ], [ 89.464789256705799, 24.550577136873894 ] ] ] ] } },
            { "type": "Feature", "properties": { "id": "05", "Name": "Mithur Bari", "Owner": "Mithu", "area": 717.068, "Use": "Resident" }, "geometry": { "type": "MultiPolygon", "coordinates": [ [ [ [ 89.465245462396027, 24.550715672632631 ], [ 89.465132528479657, 24.550953513829597 ], [ 89.465361165988043, 24.55102091663343 ], [ 89.465501930915536, 24.55082355121084 ], [ 89.465245462396027, 24.550715672632631 ] ] ] ] } },
            { "type": "Feature", "properties": { "id": "06", "Name": "Mosjid", "Owner": "Local", "area": 563.422, "Use": "Religion" }, "geometry": { "type": "MultiPolygon", "coordinates": [ [ [ [ 89.464768211574835, 24.551000057468421 ], [ 89.464644633190716, 24.551223942806359 ], [ 89.46483500240528, 24.551289616799636 ], [ 89.464954549731573, 24.551064141726993 ], [ 89.464768211574835, 24.551000057468421 ] ] ] ] } },
            { "type": "Feature", "properties": { "id": "07", "Name": "Majar", "Owner": "Pir Saheb", "area": 211.268, "Use": "Religion" }, "geometry": { "type": "MultiPolygon", "coordinates": [ [ [ [ 89.464888843521308, 24.55165099559753 ], [ 89.46502821209603, 24.551697766955176 ], [ 89.465088805228916, 24.551578664440015 ], [ 89.464952769871161, 24.551536759411309 ], [ 89.464888843521308, 24.55165099559753 ] ] ] ] } },
            { "type": "Feature", "properties": { "id": "08", "Name": "Bishar Bari", "Owner": "Bisha", "area": 229.564, "Use": "Resident" }, "geometry": { "type": "MultiPolygon", "coordinates": [ [ [ [ 89.463938343353021, 24.550836255297373 ], [ 89.464068250724083, 24.550823737702746 ], [ 89.464089386388451, 24.550668072096254 ], [ 89.463966759604375, 24.550665879376179 ], [ 89.463938343353021, 24.550836255297373 ] ] ] ] } },
            { "type": "Feature", "properties": { "id": "09", "Name": "Master Bari", "Owner": "Master", "area": 463.623, "Use": "Resident" }, "geometry": { "type": "MultiPolygon", "coordinates": [ [ [ [ 89.463522127080694, 24.549563519036852 ], [ 89.463730291091835, 24.549552395000131 ], [ 89.46387339501138, 24.549371469622081 ], [ 89.463582867449588, 24.549347605338475 ], [ 89.463522127080694, 24.549563519036852 ] ] ] ] } },
            { "type": "Feature", "properties": { "id": "10", "Name": "Primary School", "Owner": "Local", "area": 251.388, "Use": "Education" }, "geometry": { "type": "MultiPolygon", "coordinates": [ [ [ [ 89.464078551148788, 24.548856437446076 ], [ 89.464066491323976, 24.548952801343624 ], [ 89.464359454879087, 24.548947423222373 ], [ 89.464364682657632, 24.54888989658383 ], [ 89.464078551148788, 24.548856437446076 ] ] ] ] } }
          ]
        };

        // ৪. প্রতিটি প্লটের ঐতিহাসিক ছবির ডেমো ডাটাবেজ (২ বছর পরপর ছবি পরিবর্তনের সিমুলেশন)
        var propertyImages = {
            "01": { // Aam Bagan
                "2026": "https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?w=600&auto=format&fit=crop&q=60", // Full green orchard
                "2024": "https://images.unsplash.com/photo-1500937386664-56d1dfef3854?w=600&auto=format&fit=crop&q=60", // Medium growth
                "2022": "https://images.unsplash.com/photo-1464254786740-b97e5420c299?w=600&auto=format&fit=crop&q=60"  // Just ploughed land
            },
            "02": { // Agro Farm
                "2026": "https://images.unsplash.com/photo-1530595467537-0b5996c41f2d?w=600&auto=format&fit=crop&q=60", // Modern greenhouse
                "2024": "https://images.unsplash.com/photo-1500937386664-56d1dfef3854?w=600&auto=format&fit=crop&q=60", // Normal fields
                "2022": "https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=600&auto=format&fit=crop&q=60"  // Empty land
            },
            "03": { // Jamaler Bari
                "2026": "https://images.unsplash.com/photo-1513694203232-719a280e022f?w=600", // Brick house renovated
                "2024": "https://images.unsplash.com/photo-1580587771525-78b9dba3b914?w=600", // Under construction
                "2022": "https://images.unsplash.com/photo-1507089947368-19c1da9775ae?w=600"  // Old structure
            },
            "04": { // Apon er Bari
                "2026": "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=600",
                "2024": "https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=600",
                "2022": "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=600"
            },
            "05": { // Mithur Bari
                "2026": "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=600",
                "2024": "https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=600",
                "2022": "https://images.unsplash.com/photo-1527030280862-64139fbe04ca?w=600"
            },
            "06": { // Mosjid
                "2026": "https://images.unsplash.com/photo-1590076211181-a1317d33d5ff?w=600", // Completed Mosque
                "2024": "https://images.unsplash.com/photo-1542838132-92c53300491e?w=600", // Minaret under-construction
                "2022": "https://images.unsplash.com/photo-1597655601841-214a4cfe8b2c?w=600"  // Foundation layer
            },
            "07": { // Majar
                "2026": "https://images.unsplash.com/photo-1564507592333-c60657eea523?w=600",
                "2024": "https://images.unsplash.com/photo-1590076211181-a1317d33d5ff?w=600",
                "2022": "https://images.unsplash.com/photo-1597655601841-214a4cfe8b2c?w=600"
            },
            "08": { // Bishar Bari
                "2026": "https://images.unsplash.com/photo-1527030280862-64139fbe04ca?w=600",
                "2024": "https://images.unsplash.com/photo-1480074568708-e7b720bb3f09?w=600",
                "2022": "https://images.unsplash.com/photo-1507089947368-19c1da9775ae?w=600"
            },
            "09": { // Master Bari
                "2026": "https://images.unsplash.com/photo-1480074568708-e7b720bb3f09?w=600",
                "2024": "https://images.unsplash.com/photo-1513694203232-719a280e022f?w=600",
                "2022": "https://images.unsplash.com/photo-1527030280862-64139fbe04ca?w=600"
            },
            "10": { // Primary School
                "2026": "https://images.unsplash.com/photo-1541339907198-e08756dedf36?w=600", // School building
                "2024": "https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=600", // School gate
                "2022": "https://images.unsplash.com/photo-1541829019-259276a7900e?w=600"  // Playfield
            }
        };

        var selectedFeatureId = null; // বর্তমান সিলেক্টেড প্লট আইডি ট্র্যাক করার জন্য

        // ৫. ম্যাপে পার্সেল বাউন্ডারি দেখানোর কোড
        var geojsonLayer = L.geoJSON(parcelData, {
            style: function(feature) {
                return {
                    color: "#f39c12",       // কমলারঙের বাউন্ডারি
                    weight: 2.5,
                    fillColor: "#f1c40f",
                    fillOpacity: 0.25
                };
            },
            onEachFeature: function(feature, layer) {
                // প্লটের ওপর মাউস রাখলে নাম দেখাবে
                layer.bindTooltip("<b>" + feature.properties.Name + "</b>", { sticky: true });
                
                // ক্লিক ইভেন্ট
                layer.on('click', function(e) {
                    var props = feature.properties;
                    selectedFeatureId = props.id; // কারেন্ট আইডি সেভ হলো
                    
                    // ১. স্বাগতম মেসেজ হাইড করে ডিটেইলস প্যানেল ওপেন করা
                    document.getElementById('welcome-message').style.display = 'none';
                    document.getElementById('details').style.display = 'block';
                    
                    // ২. সাইডবারে রিয়েল ডাটা পুশ করা
                    document.getElementById('prop-name').innerText = props.Name;
                    document.getElementById('owner-name').innerText = props.Owner;
                    document.getElementById('prop-size').innerText = parseFloat(props.area).toFixed(2);
                    document.getElementById('prop-use').innerText = props.Use;
                    
                    // ৩. ড্রপডাউনটি রিসেট করে ২০২৬ করা এবং ছবি আপডেট করা
                    document.getElementById('yearSelect').value = "2026";
                    updateImageByYear(); 

                    // ৪. ম্যাপে হাইলাইট ইফেক্ট
                    geojsonLayer.resetStyle(); // আগের হাইলাইট রিমুভ হবে
                    layer.setStyle({
                        color: "#2ecc71",       // সিলেক্ট করলে বর্ডার সবুজ হবে
                        weight: 4,
                        fillOpacity: 0.5
                    });
                });
            }
        }).addTo(map);

        // ৬. বছর পরিবর্তনের সাথে সাথে ইমেজ পরিবর্তনের ফাংশন
        function updateImageByYear() {
            var year = document.getElementById('yearSelect').value;
            if (selectedFeatureId && propertyImages[selectedFeatureId]) {
                var newImgUrl = propertyImages[selectedFeatureId][year];
                document.getElementById('prop-image').src = newImgUrl;
            }
        }

        // ম্যাপকে ডাটার বাউন্ডারিতে অটোমেটিক জুম ও ফিট করা
        map.fitBounds(geojsonLayer.getBounds());

    </script>
</body>
</html>
